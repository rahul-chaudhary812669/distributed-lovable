apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: lovable-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app:  api-gateway
    spec:
      containers:
      - name: api-gateway
        image: rahulmahalwaar/lovable-api-gateway:0.0.1
        imagePullPolicy: Always
        env:
          - name: SPRING_PROFILES_ACTIVE
            value: k8s
          - name: CONFIG_SERVER_URL
            value: http://config-service.lovable-core.svc.cluster.local:8888
          - name: SPRING_CLOUD_CONFIG_FAIL_FAST
            value: "false"
          - name: SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS
            value: "10"
          - name: SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL
            value: "3000"
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: JWT_SECRET
          - name: ACCOUNT_SERVICE_URI
            value: http://account-service:80
          - name: INTELLIGENCE_SERVICE_URI
            value: http://intelligence-service:80
          - name: WORKSPACE_SERVICE_URI
            value: http://workspace-service:80

        ports:
          - containerPort: 8080
        resources:
          requests:
            memory: "192Mi"
            cpu: "100m"
          limits:
            memory: "384Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3


---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: lovable-core
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 8080
